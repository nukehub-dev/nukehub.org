# -------------------------------------------------------
# NGINX Configuration for api.nukehub.org
# -------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name api.nukehub.org;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.nukehub.org;

    # SSL Config (Certbot)
    ssl_certificate     /etc/letsencrypt/live/api.nukehub.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nukehub.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_redirect     off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /contact {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_redirect     off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /survey {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_redirect     off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
}
