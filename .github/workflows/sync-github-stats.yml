name: Sync GitHub Stats

on:
  schedule:
    # Every 6 hours — keeps stats fresh without hitting rate limits.
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "src/content/projects/**"
      - "scripts/sync-github-stats.mjs"
      - ".github/workflows/sync-github-stats.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT if the workflow needs to trigger downstream pages builds,
          # otherwise the default GITHUB_TOKEN is sufficient for committing.
          token: ${{ secrets.GH_STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync GitHub stats
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: node scripts/sync-github-stats.mjs

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/github-stats.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No stats changes to commit."
          else
            git commit -m "[github-sync] Update GitHub stats [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
