services:
    contact-server:
        build: .
        container_name: nukehub-contact
        restart: unless-stopped
        ports:
            - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"
        environment:
            - PORT=${PORT:-3000}
            - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
            - SMTP_HOST=${SMTP_HOST:-mail.nukehub.org}
            - SMTP_PORT=${SMTP_PORT:-587}
            - SMTP_USER=${SMTP_USER}
            - SMTP_PASS=${SMTP_PASS}
            - SMTP_SECURE=${SMTP_SECURE:-false}
            - CONTACT_TO_EMAIL=${CONTACT_TO_EMAIL:-contact@nukehub.org}
            - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://nukehub.org}
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--quiet",
                    "--tries=1",
                    "--spider",
                    "http://localhost:${PORT:-3000}/contact/health",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
