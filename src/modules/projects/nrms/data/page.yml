hero:
  badge:
    text: "Reactor Monitoring System"
    icon: "Radar"
  ctas:
    - text: "Try NRMS"
      href: "https://nrms.nukehub.org"
      variant: "primary"
      icon: "external"
      external: true
    - text: "View on GitHub"
      href: "https://github.com/nukehub-dev/nrms"
      variant: "secondary"
      icon: "github"
      external: true
  heroImage: "/assets/images/projects/nrms/hero-lite.png"
  heroImageDark: "/assets/images/projects/nrms/hero-dark.png"
  heroImageAlt: "NRMS dashboard showing global nuclear reactor map and statistics"

features:
  title: "Monitor the World's Nuclear Fleet"
  description: "Access the IAEA PRIS database and visualize nuclear reactor data in an intuitive, user-friendly interface."
  items:
    - icon: "Globe"
      title: "Global Map"
      description: "Visualize the geographical distribution of nuclear power plants worldwide for strategic planning."
      color: "amber"
    - icon: "TrendingUp"
      title: "Trends & Projections"
      description: "Explore historical statistics and future scenarios with predictive analytics."
      color: "emerald"
    - icon: "Scale"
      title: "Benchmarking"
      description: "Compare reactors operating under different conditions and assess efficiency and safety."
      color: "sky"
    - icon: "Table2"
      title: "Reactor Database"
      description: "Comprehensive list of all reactors worldwide with filtering, sorting, and detailed specs."
      color: "violet"

showcase:
  title: "Explore the Platform"
  description: "From fleet-wide overviews to reactor-level benchmarks — every view is interactive and themed for light or dark."
  items:
    - name: "Reactor Database"
      badge: "Browse & Filter"
      badgeIcon: "Table2"
      description: "A searchable, sortable table of every nuclear power reactor worldwide. Filter by country, type, status, or capacity, and drill into a dedicated page for each unit with full operational specs."
      image: "/assets/images/projects/nrms/reactors-list-lite.png"
      imageDark: "/assets/images/projects/nrms/reactors-list-dark.png"
      imageAlt: "NRMS reactor database table with filtering and sorting"
      features:
        - "Comprehensive list of all reactors worldwide"
        - "Filter by country, reactor type, status, and capacity"
        - "Sortable columns with paginated results"
        - "Direct links to individual reactor pages"
      reversed: false

    - name: "Individual Benchmarking"
      badge: "Per-Reactor Analysis"
      badgeIcon: "Scale"
      description: "Compare a single reactor against peers operating under similar conditions. Assess capacity factors, availability, and safety indicators with clear charts and contextual benchmarks."
      image: "/assets/images/projects/nrms/individual-benchmark-lite.png"
      imageDark: "/assets/images/projects/nrms/individual-benchmark-dark.png"
      imageAlt: "NRMS individual reactor benchmarking view"
      features:
        - "Capacity factor and availability comparisons"
        - "Peer grouping by reactor type and design"
        - "Historical performance trends"
        - "Contextual safety and efficiency indicators"
      reversed: true

    - name: "Group Benchmarking"
      badge: "Fleet Comparisons"
      badgeIcon: "TrendingUp"
      description: "Evaluate groups of reactors — by vendor, country, or technology family — to uncover patterns and outliers across the global fleet. Ideal for strategic planning and comparative studies."
      image: "/assets/images/projects/nrms/group-benchmark-lite.png"
      imageDark: "/assets/images/projects/nrms/group-benchmark-dark.png"
      imageAlt: "NRMS group benchmarking dashboard comparing reactor fleets"
      features:
        - "Aggregate statistics across reactor groups"
        - "Vendor and country-level comparisons"
        - "Outlier detection and ranking"
        - "Exportable charts for reporting"
      reversed: false

dataSources:
  title: "Data Sources"
  description: "NRMS connects to authoritative nuclear data sources."
  items:
    - name: "Power Reactor Information System"
      url: "https://pris.iaea.org/"
      description: "IAEA's comprehensive database of nuclear power reactors worldwide."
    - name: "Reference Data Series No. 1"
      url: "https://www.iaea.org/publications/15268/energy-electricity-and-nuclear-power-estimates-for-the-period-up-to-2050"
      description: "Energy, electricity, and nuclear power estimates through 2050."
    - name: "Reference Data Series No. 2"
      url: "https://www.iaea.org/publications/15211/nuclear-power-reactors-in-the-world"
      description: "Comprehensive data on nuclear power reactors globally."

cta:
  title: "Explore the Global Nuclear Landscape"
  description: "Access comprehensive reactor data, visualize trends, and make informed decisions."
  primary:
    text: "Try NRMS"
    href: "https://nrms.nukehub.org"
    icon: "external"
  secondary:
    text: "GitHub"
    href: "https://github.com/nukehub-dev/nrms"
    icon: "github"
