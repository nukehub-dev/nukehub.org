  In the realm of nuclear technology and software engineering, my work is driven by a commitment to innovation and sustainable development. As a passionate advocate for clean energy, I am dedicated to leveraging the principles of open-source collaboration to advance our understanding and application of nuclear science. My professional journey is fueled by a deep-seated love for my homeland, Bangladesh, and a desire to contribute to its growth as a "Green Bangladesh."

