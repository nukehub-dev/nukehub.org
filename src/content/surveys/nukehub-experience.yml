title: NukeHub Experience & Product Feedback
description: A detailed survey about your background, tool usage, and feedback on NukeHub projects.
slug: nukehub-experience
intro: |
  Thank you for taking the time to share your experience with NukeHub.
  Your answers help us prioritize features, improve documentation, and build
  better open-source tools for the nuclear community.
successMessage: Thank you for your detailed feedback — it directly shapes our roadmap.
submitLabel: Submit feedback
pages:
  - title: About You
    description: Tell us a little about your background so we can understand who is using NukeHub.
    questions:
      - id: role
        type: select
        label: What best describes your current role?
        required: true
        options:
          - Student
          - Researcher
          - Engineer
          - Educator
          - Hobbyist
          - Other

      - id: experience_years
        type: radio
        label: How long have you been working with nuclear technology?
        required: true
        options:
          - Less than 1 year
          - 1–3 years
          - 3–5 years
          - 5–10 years
          - More than 10 years

      - id: primary_field
        type: checkbox
        label: Which fields are you most active in? (Select all that apply)
        required: true
        options:
          - Fission reactors
          - Fusion energy
          - Radiation detection
          - Nuclear medicine
          - Safeguards & non-proliferation
          - Computational methods
          - Policy & education
          - Other

      - id: institution
        type: text
        label: Institution or organization
        required: false
        placeholder: e.g., MIT, IAEA, Oak Ridge National Laboratory

      - id: country
        type: text
        label: Country
        required: false
        placeholder: e.g., United States

      - id: organization_type
        type: select
        label: What type of organization are you in?
        required: false
        options:
          - Academic / university
          - Government lab
          - Industry / private company
          - Non-profit / NGO
          - Independent / hobbyist
          - Other

      - id: team_size
        type: radio
        label: How many people in your group would use a shared workspace?
        required: false
        options:
          - Just me
          - 2–5
          - 6–10
          - 11–25
          - 25+

  - title: Tools & Workflow
    description: We want to learn about the software and workflows you use today.
    questions:
      - id: tools_used
        type: textarea
        label: What software or tools do you currently use?
        description: MCNP, OpenMC, SERPENT, SCALE, Python scripts, Geant4, etc.
        required: true
        maxLength: 1000
        placeholder: I mostly use...

      - id: editor_preference
        type: checkbox
        label: Which editor or notebook environment do you prefer today?
        required: false
        options:
          - VS Code / Eclipse Theia
          - Zed
          - JupyterLab
          - PyCharm
          - RStudio
          - Vim / Emacs / neovim
          - Plain terminal
          - Other

      - id: simulation_runtime
        type: radio
        label: Where do you usually run OpenMC, Geant4, or similar simulation tools?
        required: false
        options:
          - Local workstation
          - University / lab HPC cluster
          - Cloud VMs
          - Mixed / depends on project

      - id: open_source_attitude
        type: radio
        label: How important is open-source software to your work?
        required: true
        options:
          - Essential
          - Very important
          - Nice to have
          - Not important

      - id: pain_points
        type: checkbox
        label: What are your biggest pain points with current tools? (Select up to 3)
        required: false
        maxSelections: 3
        options:
          - Difficult installation
          - Poor documentation
          - Expensive licenses
          - Slow performance
          - Hard to share models
          - Lack of visualization
          - Limited community support

      - id: workflow_description
        type: textarea
        label: Describe a typical project workflow
        description: From model creation to analysis and reporting.
        required: false
        maxLength: 1500
        placeholder: I usually start by...

  - title: NukeLab Feedback
    description: Share your thoughts on NukeLab, our reactor simulation workbench.
    image: /assets/images/projects/nuke-lab/hero-dark.png
    questions:
      - id: nukelab_used
        type: radio
        label: Have you used NukeLab?
        required: true
        options:
          - label: Yes, regularly
            value: regularly
          - label: Yes, a few times
            value: few-times
          - label: Tried it once
            value: once
          - label: No, but I am interested
            value: interested
          - label: No, not relevant to me
            value: not-relevant

      - id: deployment_preference
        type: radio
        label: How would you prefer to run NukeLab?
        required: false
        options:
          - Fully hosted by NukeHub
          - Self-hosted on our own infrastructure
          - Hybrid (sensitive workloads on-prem, public on hosted)
          - Not sure yet

      - id: airgapped_need
        type: radio
        label: Do you need on-premise or air-gapped deployment support?
        required: false
        options:
          - Yes, essential
          - Yes, nice to have
          - No, cloud-hosted is fine
          - Not sure

      - id: collaboration_frequency
        type: radio
        label: How often do you share models, input files, or results with collaborators?
        required: false
        options:
          - Daily
          - Weekly
          - Monthly
          - Rarely
          - Never

      - id: collaboration_features
        type: checkbox
        label: Which collaboration features would you value?
        required: false
        options:
          - Shared workspaces
          - Reproducible environment snapshots
          - Shared benchmark suites
          - Result commenting / annotations
          - Versioned model libraries
          - Public / private project links

      - id: nukelab_platform_features
        type: checkbox
        label: Which NukeLab platform features interest you most?
        required: false
        options:
          - On-demand containerized workspaces
          - Resource plans and credit management
          - Real-time server monitoring
          - Collaboration and shared workspaces

      - id: nukelab_rating
        type: rating
        label: How would you rate NukeLab overall?
        required: false
        min: 1
        max: 5

      - id: nukelab_feedback
        type: textarea
        label: What would make NukeLab more useful to you?
        required: false
        maxLength: 1000
        placeholder: I wish NukeLab could...

  - title: NukeIDE
    description: Feedback on our IDE.
    image: /assets/images/projects/nuke-ide/hero-dark.png
    questions:
      - id: nukeide_interest
        type: radio
        label: How interested are you in a dedicated IDE for nuclear workflows?
        required: true
        options:
          - Very interested
          - Somewhat interested
          - Neutral
          - Not interested

      - id: nukeide_features
        type: checkbox
        label: Which NukeIDE capabilities interest you most?
        description: NukeIDE is the nuclear simulation IDE that runs inside NukeLab workspaces.
        required: false
        options:
          - Geometry builder
          - Material library
          - Cross-section handling
          - Tallies & analysis
          - Visualization
          - OpenMC Studio
          - Environment management

      - id: ai_assistance_interest
        type: radio
        label: How interested are you in AI-assisted features inside NukeIDE?
        description: Examples include natural-language model setup, code explanation, error diagnosis, and automated report generation.
        required: false
        options:
          - Very interested
          - Somewhat interested
          - Neutral
          - Not interested
          - Prefer not to use AI

      - id: analytics_interest
        type: checkbox
        label: Which analytics capabilities would you value? (Select all that apply)
        required: false
        options:
          - Result comparison across simulations
          - Automated sensitivity analysis
          - Uncertainty quantification
          - Interactive plotting
          - Report generation
          - Benchmark suites

      - id: integration_priority
        type: select
        label: Which integration should we prioritize?
        required: false
        options:
          - OpenMC
          - Geant4
          - MOOSE
          - Cardinal
          - OpenFOAM

  - title: Final Thoughts
    description: Last few questions to help us improve.
    image: /assets/images/projects/nrms/hero-dark.png
    questions:
      - id: missing_feature
        type: textarea
        label: What feature or tool feels missing from NukeHub right now?
        description: Be as specific as you like — examples are helpful.
        required: true
        maxLength: 1500
        placeholder: I wish NukeHub had...

      - id: liked_most
        type: textarea
        label: What do you like most about NukeHub so far?
        required: false
        maxLength: 1000
        placeholder: The part I enjoy most is...

      - id: satisfaction
        type: rating
        label: How would you rate your overall experience with NukeHub?
        required: true
        min: 1
        max: 5

      - id: improvements
        type: checkbox
        label: Where should we focus our efforts? (Select up to 3)
        required: false
        maxSelections: 3
        options:
          - Better documentation
          - More example projects
          - Faster performance
          - More integrations
          - Community forums
          - Video tutorials
          - API access

      - id: email
        type: email
        label: Email (optional)
        description: Leave your email if you are open to a short follow-up conversation.
        required: false
        placeholder: you@example.com
