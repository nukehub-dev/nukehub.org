sectionTitle: "Trusted by Researchers"
sectionSubtitle: "Hear from the engineers and scientists building the future with NukeHub."
badge: "Testimonials"

testimonials:
  - quote: "NukeHub has transformed how our research group collaborates on Monte Carlo simulations. The cloud-based OpenMC integration is a game-changer."
    author: "Dr. Sarah Chen"
    role: "Nuclear Engineering, MIT"
    avatar: "SC"
  - quote: "The open data initiative and IAEA PRIS integration make NukeHub an invaluable resource for reactor physics research and education."
    author: "Prof. James Rodriguez"
    role: "Reactor Physics, EPFL"
    avatar: "JR"
  - quote: "Finally, a platform that brings together simulation, data, and community. NukeHub is exactly what the nuclear field needed."
    author: "Dr. Aisha Patel"
    role: "Radiation Transport, ANL"
    avatar: "AP"
